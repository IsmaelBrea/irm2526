<div>
    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4 px-2">Competiciones</p>
    <div class="flex flex-col space-y-1">
        {% for league in leagues %}
        <a href="{{ request.path }}?league={{ league.id }}"
           class="flex items-center gap-3 px-3 py-2 rounded-lg transition-all group
           {% if selected_league.id == league.id or selected_league_id|slugify == league.id|slugify %} 
                bg-green-500/10 text-green-400 border border-green-500/20 
           {% else %} 
                text-slate-400 hover:bg-slate-800 hover:text-green-500 
           {% endif %}">
            
            {% if league.emblem %}
                <img src="{{ league.emblem }}" class="w-4 h-4 object-contain grayscale group-hover:grayscale-0 
                     {% if selected_league.id == league.id or selected_league_id|slugify == league.id|slugify %} grayscale-0 {% endif %}">
            {% endif %}
            
            <span class="text-xs font-semibold truncate">{{ league.name }}</span>
        </a>
        {% endfor %}
    </div>
</div>
