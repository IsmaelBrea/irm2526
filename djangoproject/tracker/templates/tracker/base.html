<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IRM Performance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; }
        /* Scrollbar minimalista para el menú de ligas */
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #15803d; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-50">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col">
            <div class="p-6 border-b border-slate-800">
                <h1 class="text-xl font-black text-green-500 tracking-tighter italic">IRM TRACKER</h1>
            </div>
            
            <nav class="flex-1 overflow-y-auto custom-scroll p-4 space-y-6">
                <div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4 px-2">Competiciones</p>
                    <div class="flex flex-col space-y-1">
                        {% for league in leagues %}
                        <a href="?league={{ league.id }}" 
                           class="flex items-center gap-3 px-3 py-2 rounded-lg transition-all group
                           {% if selected_league.id == league.id %} bg-green-500/10 text-green-400 border border-green-500/20 {% else %} text-slate-400 hover:bg-slate-800 hover:text-green-500 {% endif %}">
                            {% if league.emblem %}
                                <img src="{{ league.emblem }}" class="w-4 h-4 object-contain grayscale group-hover:grayscale-0">
                            {% endif %}
                            <span class="text-xs font-semibold truncate">{{ league.name }}</span>
                        </a>
                        {% endfor %}
                    </div>
                </div>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 border-b border-slate-800 flex items-center px-8 bg-slate-900/20">
                <div class="flex items-center gap-2 text-[10px] font-mono text-slate-500 uppercase">
                    <span>Procesado por IRM Engine</span>
                    <span class="w-1 h-1 bg-green-500 rounded-full animate-pulse"></span>
                </div>
            </header>
            
            <main class="flex-1 overflow-y-auto p-10">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
