<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IRM Performance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    {% block extra_head %}{% endblock %}

   <style>
    body { background-color: #020617; }
    .custom-scroll::-webkit-scrollbar { width: 3px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #15803d; border-radius: 10px; }

    /* ── Placeholder global para vistas sin liga seleccionada ── */
    .irm-placeholder {
        color: #94a3b8;
        font-family: monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        animation: irmPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes irmPulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
    }
</style>
</head>
<body class="text-slate-50">
    <div class="flex h-screen overflow-hidden">

        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col">
            <div class="p-6 border-b border-slate-800">
                <a href="{% url 'tracker:home' %}" class="block hover:opacity-80 transition-opacity">
                    <h1 class="text-xl font-black text-green-500 tracking-tighter italic">IRM TRACKER</h1>
                </a>
            </div>
            
            <nav class="flex-1 overflow-y-auto custom-scroll p-4 flex flex-col">
                <div class="flex-1">
                    {% include "tracker/leagues.html" %}
                </div>
        
                {% include "tracker/nav_extra.html" %}
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 border-b border-slate-800 flex items-center px-8 bg-slate-900/20">
                <div class="flex items-center gap-2 text-[10px] font-mono text-slate-500 uppercase">
                    <span>Procesado por IRM Engine</span>
                    <span class="w-1 h-1 bg-green-500 rounded-full animate-pulse"></span>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto p-10">
                {% block content %}{% endblock %}
            </main>
        </div>

    </div>
</body>
</html>
