{% extends "tracker/base.html" %}
{% load static %}

{% block content %}
<div class="ml-4 max-w-6xl space-y-8">
    {% if selected_league %}
        <div class="flex items-center gap-6 pb-6 border-b border-slate-800 mb-8">
            <h2 class="text-3xl font-black text-white tracking-tighter uppercase">Partidos</h2>
            <span class="text-slate-400">{{ selected_league.name }}</span>
        </div>

        <div class="flex gap-4">
            <div class="flex-1">
                <label id="season-label" class="block text-sm text-slate-400 mb-2">Temporada</label>
                <select id="season-filter" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-green-500">
                </select>
            </div>

            <div class="flex-1">
                <label id="round-label" class="block text-sm text-slate-400 mb-2">Jornada</label>
                <select id="round-filter" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-green-500">
                </select>
            </div>
        </div>

        <div id="matches-container" class="space-y-3">
            <p class="text-slate-400">Cargando partidos...</p>
        </div>

    {% else %}
        <div class="h-[50vh] flex items-center">
            <p class="text-slate-500 font-mono text-[10px] uppercase tracking-widest">
                <-- Selecciona una competición
            </p>
        </div>
    {% endif %}

    <script src="{% static 'tracker/js/partidos.js' %}"></script>
</div>
{% endblock %}
