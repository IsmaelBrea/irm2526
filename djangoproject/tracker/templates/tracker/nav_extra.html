<div class="mt-10 pt-6 border-t border-slate-800 space-y-2">
    
    <div class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-500 cursor-default opacity-60">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
        </svg>
        <span class="text-[11px] font-bold uppercase tracking-wider">Análisis Avanzado</span>
    </div>

    <div class="space-y-1">
        <a href="{% url 'tracker:league-detail' %}{% if selected_league %}?league={{ selected_league.id }}{% endif %}" 
           class="flex items-center gap-3 px-3 py-2 rounded-lg transition-all group
           {% if request.resolver_match.url_name == 'league-detail' or request.resolver_match.url_name == 'datos-jugador' %} bg-green-500/10 text-green-400 border border-green-500/20 {% else %} text-slate-400 hover:bg-slate-800 hover:text-green-500 {% endif %}">
            <svg class="w-4 h-4 opacity-50 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            <span class="text-[11px] font-bold uppercase tracking-wider">Rendimiento Indiv.</span>
        </a>

        {% if request.resolver_match.url_name == 'league-detail' or request.resolver_match.url_name == 'datos-jugador' %}
        <div class="pl-9 pr-2 py-1">
            <a href="{% url 'tracker:datos-jugador' %}{% if selected_league %}?league={{ selected_league.id }}{% endif %}" 
               class="block px-3 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all
               {% if request.resolver_match.url_name == 'datos-jugador' %} text-green-400 bg-green-500/5 {% else %} text-slate-500 hover:text-slate-300 {% endif %}">
               • Datos Jugador
            </a>
        </div>
        {% endif %}
    </div>
</div>
